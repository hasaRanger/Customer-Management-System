spring.application.name=backend

# ?? DataSource ????????????????????????????????????????????????
spring.datasource.url=jdbc:mariadb://localhost:3306/customer_mgmt?useUnicode=true&characterEncoding=UTF-8
spring.datasource.username=cms_user
spring.datasource.password=cms_pass123
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# ?? JPA / Hibernate ???????????????????????????????????????????
# MariaDB106Dialect is the correct class in Hibernate 5 (Spring Boot 2.7)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDB106Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Batch inserts (for bulk upload performance)
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ?? Jackson ???????????????????????????????????????????????????
# Serialize LocalDate as "2024-01-15" not as array [2024,1,15]
spring.jackson.serialization.write-dates-as-timestamps=false

# ?? Multipart (large Excel uploads) ???????????????????????????
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# ?? Async thread pool (bulk upload) ???????????????????????????
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4
spring.task.execution.pool.queue-capacity=10

# ?? Server ????????????????????????????????????????????????????
server.port=8080